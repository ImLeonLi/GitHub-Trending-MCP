<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Extractor - Test Interface</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    h1 {
      color: white;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .lang-switch {
      display: flex;
      gap: 10px;
    }
    
    .lang-btn {
      padding: 10px 20px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .lang-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .lang-btn.active {
      background: white;
      color: #667eea;
    }
    
    .control-panel {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    select, input {
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .results-panel {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      min-height: 200px;
    }
    
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .results-header h2 {
      color: #333;
    }
    
    .stats-badge {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #c33;
    }
    
    .repo-list {
      display: grid;
      gap: 16px;
    }
    
    .repo-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e0e0e0;
      transition: all 0.3s;
    }
    
    .repo-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    
    .repo-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .repo-name {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      text-decoration: none;
    }
    
    .repo-name:hover {
      text-decoration: underline;
    }
    
    .repo-stats {
      display: flex;
      gap: 15px;
      font-size: 14px;
      color: #666;
    }
    
    .repo-stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .repo-stat.stars-today {
      color: #28a745;
      font-weight: 600;
    }
    
    .repo-description {
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    
    .repo-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .language {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #666;
    }
    
    .language-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #667eea;
    }
    
    .contributors {
      display: flex;
      align-items: center;
      gap: -8px;
    }
    
    .contributor-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid white;
      margin-left: -8px;
      transition: transform 0.2s;
    }
    
    .contributor-avatar:first-child {
      margin-left: 0;
    }
    
    .contributor-avatar:hover {
      transform: scale(1.2);
      z-index: 10;
    }
    
    .json-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      color: #666;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #999;
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="pageTitle">🔥 GitHub Trending Extractor</h1>
      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
      </div>
    </div>
    
    <div class="control-panel">
      <div class="form-row">
        <div class="form-group">
          <label for="since" data-i18n="since">时间范围</label>
          <select id="since">
            <option value="daily" data-i18n="daily">今日 (Daily)</option>
            <option value="weekly" data-i18n="weekly">本周 (Weekly)</option>
            <option value="monthly" data-i18n="monthly">本月 (Monthly)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="language" data-i18n="programmingLanguage">编程语言</label>
          <select id="language">
            <option value="" data-i18n="allLanguages">所有语言</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="rust">Rust</option>
            <option value="go">Go</option>
            <option value="java">Java</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
            <option value="csharp">C#</option>
            <option value="ruby">Ruby</option>
            <option value="php">PHP</option>
            <option value="swift">Swift</option>
            <option value="kotlin">Kotlin</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="spokenLanguage" data-i18n="spokenLanguage">开发者语言</label>
          <select id="spokenLanguage">
            <option value="" data-i18n="allLanguages">所有语言</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn-primary" onclick="fetchTrending()" data-i18n="fetchBtn">🚀 获取 Trending 数据</button>
        <button class="btn-secondary" onclick="loadExample()" data-i18n="loadExampleBtn">📋 加载示例数据</button>
        <button class="btn-secondary" onclick="clearResults()" data-i18n="clearBtn">🗑️ 清空结果</button>
      </div>
    </div>
    
    <div class="results-panel">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('cards')" data-i18n="cardView">📦 卡片视图</button>
        <button class="tab" onclick="switchTab('json')" data-i18n="jsonView">📄 JSON 数据</button>
      </div>
      
      <div id="cards" class="tab-content active">
        <div id="cardsContent">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="15"></line>
              <line x1="15" y1="9" x2="9" y2="15"></line>
            </svg>
            <p data-i18n="emptyHint">点击"获取 Trending 数据"按钮开始测试</p>
          </div>
        </div>
      </div>
      
      <div id="json" class="tab-content">
        <div id="jsonContent">
          <div class="empty-state">
            <p data-i18n="jsonHint">JSON 数据将显示在这里</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // i18n translations
    const i18n = {
      zh: {
        pageTitle: '🔥 GitHub Trending 提取工具',
        since: '时间范围',
        programmingLanguage: '编程语言',
        spokenLanguage: '开发者语言',
        allLanguages: '所有语言',
        daily: '今日 (Daily)',
        weekly: '本周 (Weekly)',
        monthly: '本月 (Monthly)',
        fetchBtn: '🚀 获取 Trending 数据',
        loadExampleBtn: '📋 加载示例数据',
        clearBtn: '🗑️ 清空结果',
        cardView: '📦 卡片视图',
        jsonView: '📄 JSON 数据',
        emptyHint: '点击"获取 Trending 数据"按钮开始测试',
        jsonHint: 'JSON 数据将显示在这里',
        loading: '正在获取数据...',
        errorPrefix: '错误：',
        noRepos: '没有找到符合条件的仓库',
        reposCount: '个仓库',
        loadingExample: '正在加载示例数据...',
        fetchingWithOptions: '[API] 正在获取数据，参数：',
        statistics: '统计',
        totalRepos: '总仓库数',
        languageDistribution: '语言分布',
        totalStars: '总 Stars',
        totalForks: '总 Forks',
        noDescription: '暂无描述',
        unknown: '未知',
        description: '查看 GitHub 社区今天最感兴趣的内容。',
        descriptionWeekly: '查看 GitHub 社区本周最感兴趣的内容。',
        descriptionMonthly: '查看 GitHub 社区本月最感兴趣的内容。'
      },
      en: {
        pageTitle: '🔥 GitHub Trending Extractor',
        since: 'Time Range',
        programmingLanguage: 'Programming Language',
        spokenLanguage: 'Spoken Language',
        allLanguages: 'All Languages',
        daily: 'Today (Daily)',
        weekly: 'This Week (Weekly)',
        monthly: 'This Month (Monthly)',
        fetchBtn: '🚀 Fetch Trending Data',
        loadExampleBtn: '📋 Load Example Data',
        clearBtn: '🗑️ Clear Results',
        cardView: '📦 Card View',
        jsonView: '📄 JSON Data',
        emptyHint: 'Click "Fetch Trending Data" to start testing',
        jsonHint: 'JSON data will be displayed here',
        loading: 'Fetching data...',
        errorPrefix: 'Error: ',
        noRepos: 'No repositories found matching the criteria',
        reposCount: 'repositories',
        loadingExample: 'Loading example data...',
        fetchingWithOptions: '[API] Fetching with options:',
        statistics: 'Statistics',
        totalRepos: 'Total Repos',
        languageDistribution: 'Language Distribution',
        totalStars: 'Total Stars',
        totalForks: 'Total Forks',
        noDescription: 'No description available',
        unknown: 'Unknown',
        description: 'See what the GitHub community is most excited about today.',
        descriptionWeekly: 'See what the GitHub community is most excited about this week.',
        descriptionMonthly: 'See what the GitHub community is most excited about this month.'
      }
    };

    let currentLang = 'zh';

    // Language colors
    const languageColors = {
      'Python': '#3572A5',
      'JavaScript': '#f1e05a',
      'TypeScript': '#2b7489',
      'Rust': '#dea584',
      'Go': '#00ADD8',
      'Java': '#b07219',
      'C': '#555555',
      'C++': '#f34b7d',
      'C#': '#178600',
      'Ruby': '#701516',
      'PHP': '#4F5D95',
      'Swift': '#ffac45',
      'Kotlin': '#A97BFF',
      'Shell': '#89e051',
      'HTML': '#e34c26',
      'CSS': '#563d7c',
      'Vue': '#41b883',
      'React': '#61dafb'
    };

    function t(key) {
      return i18n[currentLang][key] || key;
    }

    function setLanguage(lang) {
      currentLang = lang;
      
      // Update active button
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase().includes(lang)) {
          btn.classList.add('active');
        }
      });
      
      // Update page title
      document.getElementById('pageTitle').textContent = t('pageTitle');
      
      // Update all elements with data-i18n attribute
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (el.tagName === 'OPTION') {
          // Keep original value, just update display text
          const originalValue = el.value;
          el.textContent = t(key);
        } else {
          el.textContent = t(key);
        }
      });
      
      // Update empty states
      const cardsContent = document.getElementById('cardsContent');
      const jsonContent = document.getElementById('jsonContent');
      
      if (cardsContent.querySelector('.empty-state')) {
        cardsContent.querySelector('.empty-state p').textContent = t('emptyHint');
      }
      if (jsonContent.querySelector('.empty-state')) {
        jsonContent.querySelector('.empty-state p').textContent = t('jsonHint');
      }
      
      // Save preference
      localStorage.setItem('github-trending-lang', lang);
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }

    function getLanguageColor(lang) {
      return languageColors[lang] || '#667eea';
    }

    async function fetchTrending() {
      const since = document.getElementById('since').value;
      const language = document.getElementById('language').value;
      const spokenLanguage = document.getElementById('spokenLanguage').value;

      const cardsContent = document.getElementById('cardsContent');
      const jsonContent = document.getElementById('jsonContent');

      // Show loading state
      cardsContent.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>${t('loading')}</p>
        </div>
      `;

      try {
        const params = new URLSearchParams();
        params.append('since', since);
        if (language) params.append('language', language);
        if (spokenLanguage) params.append('spokenLanguageCode', spokenLanguage);

        const response = await fetch(`http://localhost:34567/api/trending?${params}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to fetch data');
        }

        renderResults(data);
      } catch (error) {
        cardsContent.innerHTML = `
          <div class="error">
            <strong>${t('errorPrefix')}</strong>${error.message}
          </div>
        `;
        jsonContent.innerHTML = `
          <div class="error">
            <strong>${t('errorPrefix')}</strong>${error.message}
          </div>
        `;
      }
    }

    function renderResults(data) {
      const { metadata, repositories } = data;
      
      // Get description based on since value
      const since = document.getElementById('since').value;
      let description = t('description');
      if (since === 'weekly') description = t('descriptionWeekly');
      if (since === 'monthly') description = t('descriptionMonthly');
      
      // Render card view
      const cardsContent = document.getElementById('cardsContent');
      if (repositories.length === 0) {
        cardsContent.innerHTML = `
          <div class="empty-state">
            <p>${t('noRepos')}</p>
          </div>
        `;
      } else {
        const stats = calculateStats(repositories);
        cardsContent.innerHTML = `
          <div class="results-header">
            <h2>${description}</h2>
            <div class="stats-badge">
              <span class="badge">📦 ${stats.total} ${t('reposCount')}</span>
              <span class="badge">⭐ ${formatNumber(stats.totalStars)} stars</span>
              <span class="badge">🍴 ${formatNumber(stats.totalForks)} forks</span>
            </div>
          </div>
          <div class="repo-list">
            ${repositories.map(repo => renderRepoCard(repo)).join('')}
          </div>
        `;
      }

      // Render JSON view
      document.getElementById('jsonContent').innerHTML = `
        <pre class="json-output">${syntaxHighlight(JSON.stringify(data, null, 2))}</pre>
      `;
    }

    function renderRepoCard(repo) {
      const contributorsHtml = repo.contributors.slice(0, 5).map(c => `
        <a href="${c.url}" target="_blank" title="${c.username}">
          <img src="${c.avatar}" alt="${c.username}" class="contributor-avatar">
        </a>
      `).join('');

      return `
        <div class="repo-card">
          <div class="repo-header">
            <a href="${repo.url}" target="_blank" class="repo-name">${repo.name}</a>
            <div class="repo-stats">
              <span class="repo-stat">⭐ ${formatNumber(repo.stars)}</span>
              <span class="repo-stat">🍴 ${formatNumber(repo.forks)}</span>
              <span class="repo-stat stars-today">📈 +${formatNumber(repo.starsToday)} today</span>
            </div>
          </div>
          <p class="repo-description">${repo.description || t('noDescription')}</p>
          <div class="repo-meta">
            <div class="language">
              <span class="language-dot" style="background: ${getLanguageColor(repo.language)}"></span>
              <span>${repo.language || t('unknown')}</span>
            </div>
            <div class="contributors">
              ${contributorsHtml}
              ${repo.contributors.length > 5 ? `<span style="margin-left: 5px; color: #666;">+${repo.contributors.length - 5}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function calculateStats(repos) {
      return {
        total: repos.length,
        totalStars: repos.reduce((sum, r) => sum + r.stars, 0),
        totalForks: repos.reduce((sum, r) => sum + r.forks, 0)
      };
    }

    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      }
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'k';
      }
      return num.toString();
    }

    function syntaxHighlight(json) {
      return json
        .replace(/"(\w+)":/g, '<span style="color: #9cdcfe;">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span style="color: #ce9178;">"$1"</span>')
        .replace(/: (\d+)/g, ': <span style="color: #b5cea8;">$1</span>')
        .replace(/: (true|false)/g, ': <span style="color: #569cd6;">$1</span>')
        .replace(/: (null)/g, ': <span style="color: #569cd6;">$1</span>');
    }

    function loadExample() {
      const exampleData = {
        metadata: {
          title: "Trending",
          description: currentLang === 'zh' ? '查看 GitHub 社区今天最感兴趣的内容。' : 'See what the GitHub community is most excited about today.',
          filterOptions: { since: "daily" }
        },
        repositories: [
          {
            name: "microsoft / BitNet",
            url: "https://github.com/microsoft/BitNet",
            description: "Official inference framework for 1-bit LLMs",
            language: "Python",
            stars: 32744,
            starsUrl: "https://github.com/microsoft/BitNet/stargazers",
            forks: 1234,
            forksUrl: "https://github.com/microsoft/BitNet/forks",
            starsToday: 2149,
            starsTodayText: "2,149 stars today",
            contributors: [
              { username: "user1", url: "https://github.com/user1", avatar: "https://avatars.githubusercontent.com/u/1?v=4" },
              { username: "user2", url: "https://github.com/user2", avatar: "https://avatars.githubusercontent.com/u/2?v=4" },
              { username: "user3", url: "https://github.com/user3", avatar: "https://avatars.githubusercontent.com/u/3?v=4" }
            ]
          },
          {
            name: "fishaudio / fish-speech",
            url: "https://github.com/fishaudio/fish-speech",
            description: "SOTA Open Source TTS",
            language: "Python",
            stars: 26507,
            starsUrl: "https://github.com/fishaudio/fish-speech/stargazers",
            forks: 987,
            forksUrl: "https://github.com/fishaudio/fish-speech/forks",
            starsToday: 637,
            starsTodayText: "637 stars today",
            contributors: [
              { username: "dev1", url: "https://github.com/dev1", avatar: "https://avatars.githubusercontent.com/u/4?v=4" },
              { username: "dev2", url: "https://github.com/dev2", avatar: "https://avatars.githubusercontent.com/u/5?v=4" }

          }
        ]
      };
      renderResults(exampleData);
    }

    function clearResults() {
      document.getElementById('cardsContent').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
          <p data-i18n="emptyHint">${t('emptyHint')}</p>
        </div>
      `;
      document.getElementById('jsonContent').innerHTML = `
        <div class="empty-state">
          <p data-i18n="jsonHint">${t('jsonHint')}</p>
        </div>
      `;
    }

    // Initialize language from localStorage or default to Chinese
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('github-trending-lang') || 'zh';
      setLanguage(savedLang);
    });
  </script>
