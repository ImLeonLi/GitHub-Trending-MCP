name: Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0, v2.1.0 等 tag 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许上传 Release 文件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # 与你项目匹配的 Node 版本
          cache: 'npm'            # 缓存依赖，加速构建

      - name: Install dependencies
        run: npm ci               # 使用 ci 保证可重现安装

      - name: Compile TypeScript
        run: npm run build        # 假设 package.json 中定义了 "build": "tsc"

      - name: Package files
        run: |
          # 创建一个临时目录，存放要发布的文件
          mkdir release_package
          # 复制编译产物（tsc 输出到 dist/ 目录）
          cp -r dist release_package/
          # 复制静态资源和技能文件
          cp -r public release_package/ || true
          cp -r skill release_package/ || true
          # 复制启动脚本
          cp start-server.bat start-server.sh release_package/ || true
          # 复制配置和文档文件
          cp package.json README.md README_CN.md LICENSE release_package/ || true
          # 复制运行时依赖（包含 node_modules）
          cp -r node_modules release_package/
          # 打包成 zip 文件
          cd release_package
          zip -r ../github-trending-mcp-${{ github.ref_name }}.zip .
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: github-trending-mcp-*.zip # 匹配上面生成的 zip 文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}